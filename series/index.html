        <script>
        (function() {
            var toggle = document.getElementById('toc-toggle');
            var toc = document.getElementById('article-toc');
            var content = document.querySelector('.content.container');

            function updateToggle(collapsed) {
                if (collapsed) {
                    toc.classList.add('collapsed');
                    toggle.classList.add('collapsed');
                    if (content) content.classList.add('toc-collapsed');
                } else {
                    toc.classList.remove('collapsed');
                    toggle.classList.remove('collapsed');
                    if (content) content.classList.remove('toc-collapsed');
                }
            }

            var isCollapsed = localStorage.getItem('toc-collapsed') === 'true';
            updateToggle(isCollapsed);

            toggle.addEventListener('click', function() {
                var currentlyCollapsed = toc.classList.contains('collapsed');
                updateToggle(!currentlyCollapsed);
                localStorage.setItem('toc-collapsed', !currentlyCollapsed);
            });
        })();
        </script>
